<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

  <script src="../../_ds_bundle.js"></script>

<body>
<div id="root"></div>
<script type="text/babel">
const { ArticleCard, PullQuote, Divider } = window.DesignSystem_6c4953;

function Card() {
  return (
    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:24}}>
      <div>
        <ArticleCard
          title="The Geometry of Space"
          category="Science"
          date="Jul 2026"
          readTime="6 min read"
          excerpt="How topology and differential geometry reshape our understanding of the cosmos."
          layout="minimal"
        />
      </div>
      <div>
        <ArticleCard
          title="High Press Systems in Modern Football"
          category="Analysis"
          date="Jun 2026"
          readTime="9 min read"
          excerpt="A tactical breakdown of pressing triggers, cover shadows, and defensive compactness."
          layout="minimal"
          featured={true}
        />
      </div>
      <div style={{gridColumn:'1/-1'}}>
        <Divider label="Pull Quote" style={{marginBottom:16}} />
        <PullQuote
          quote="The most compelling ideas live at the intersection of mathematics and the physical world."
          attribution="Mathlacome"
        />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Card />);
</script>
</body>
</html>
