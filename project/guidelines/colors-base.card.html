<!-- @dsCard group="Colors" viewport="700x140" name="Base Palette" subtitle="Black, white, cream and ink scale" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { padding: 20px; background: var(--bg-page); font-family: var(--font-body); }
    .row { display: flex; gap: 8px; align-items: stretch; }
    .swatch { flex: 1; height: 56px; border: 1px solid var(--border-default); }
    .label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-tertiary); margin-top: 5px; text-align: center; }
  </style>
</head>
<body>
<div class="row">
  <div>
    <div class="swatch" style="background:#000000;"></div>
    <div class="label">Black</div>
  </div>
  <div>
    <div class="swatch" style="background:#111111;"></div>
    <div class="label">Ink</div>
  </div>
  <div>
    <div class="swatch" style="background:#444444;"></div>
    <div class="label">Ink Muted</div>
  </div>
  <div>
    <div class="swatch" style="background:#777777;"></div>
    <div class="label">Ink Subtle</div>
  </div>
  <div>
    <div class="swatch" style="background:#AAAAAA;"></div>
    <div class="label">Ink Ghost</div>
  </div>
  <div>
    <div class="swatch" style="background:#D4CFC8; border-color:#ccc;"></div>
    <div class="label">Rule</div>
  </div>
  <div>
    <div class="swatch" style="background:#F8F6F3; border-color:#ccc;"></div>
    <div class="label">Muted BG</div>
  </div>
  <div>
    <div class="swatch" style="background:#F2EDE4; border-color:#ccc;"></div>
    <div class="label">Cream</div>
  </div>
  <div>
    <div class="swatch" style="background:#E8E1D6; border-color:#ccc;"></div>
    <div class="label">Cream Dark</div>
  </div>
  <div>
    <div class="swatch" style="background:#FFFFFF; border-color:#ccc;"></div>
    <div class="label">White</div>
  </div>
</div>
</body>
</html>
