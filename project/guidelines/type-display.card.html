<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { padding: 24px; background: var(--bg-page); }
    .row { border-top: 1px solid var(--border-default); padding: 10px 0; display: flex; align-items: baseline; gap: 16px; }
    .size { font-family: var(--font-body); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-tertiary); width: 56px; flex-shrink: 0; }
  </style>
</head>
<body>
<div class="row">
  <span class="size">2XL · 96</span>
  <span style="font-family:var(--font-display);font-size:var(--text-display-2xl);line-height:1;letter-spacing:0.02em;">Mathlacome</span>
</div>
<div class="row">
  <span class="size">XL · 72</span>
  <span style="font-family:var(--font-display);font-size:var(--text-display-xl);line-height:1;letter-spacing:0.02em;">Science & Football</span>
</div>
<div class="row">
  <span class="size">LG · 48</span>
  <span style="font-family:var(--font-display);font-size:var(--text-display-lg);line-height:1;letter-spacing:0.02em;">The Geometry of Space</span>
</div>
<div class="row">
  <span class="size">MD · 36</span>
  <span style="font-family:var(--font-display);font-size:var(--text-display-md);line-height:1.05;letter-spacing:0.02em;">High Press Systems in Modern Football</span>
</div>
<div class="row">
  <span class="size">SM · 28</span>
  <span style="font-family:var(--font-display);font-size:var(--text-display-sm);line-height:1.05;letter-spacing:0.02em;">How topology reshapes our understanding of the cosmos</span>
</div>
</body>
</html>
