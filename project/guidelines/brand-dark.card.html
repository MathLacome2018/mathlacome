<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { padding: 0; background: #000; font-family: var(--font-body); }
    .panel { background: #000; color: #fff; padding: 28px 32px; display: flex; align-items: center; justify-content: space-between; }
  </style>
</head>
<body>
<div class="panel">
  <div>
    <div style="font-family:var(--font-display);font-size:2.5rem;letter-spacing:0.04em;line-height:1;color:#fff;">The Black Section</div>
    <div style="font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-top:8px;">Used for hero, CTA banners, and footer</div>
  </div>
  <div style="display:flex;gap:12px;">
    <div style="width:44px;height:44px;border:1px solid rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.5);">Btn</div>
    <div style="width:44px;height:44px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:#000;">CTA</div>
  </div>
</div>
</body>
</html>
