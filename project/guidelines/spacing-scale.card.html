<!-- @dsCard group="Spacing" viewport="700x140" name="Spacing Scale" subtitle="4px base grid — space-1 through space-32" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { padding: 20px; background: var(--bg-page); font-family: var(--font-body); }
    .row { display: flex; align-items: flex-end; gap: 12px; }
    .item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .bar { background: var(--fg-primary); width: 24px; }
    .lbl { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-tertiary); }
  </style>
</head>
<body>
<div class="row">
  <div class="item"><div class="bar" style="height:4px;"></div><div class="lbl">1<br>4px</div></div>
  <div class="item"><div class="bar" style="height:8px;"></div><div class="lbl">2<br>8px</div></div>
  <div class="item"><div class="bar" style="height:12px;"></div><div class="lbl">3<br>12px</div></div>
  <div class="item"><div class="bar" style="height:16px;"></div><div class="lbl">4<br>16px</div></div>
  <div class="item"><div class="bar" style="height:20px;"></div><div class="lbl">5<br>20px</div></div>
  <div class="item"><div class="bar" style="height:24px;"></div><div class="lbl">6<br>24px</div></div>
  <div class="item"><div class="bar" style="height:32px;"></div><div class="lbl">8<br>32px</div></div>
  <div class="item"><div class="bar" style="height:40px;"></div><div class="lbl">10<br>40px</div></div>
  <div class="item"><div class="bar" style="height:48px;"></div><div class="lbl">12<br>48px</div></div>
  <div class="item"><div class="bar" style="height:64px;"></div><div class="lbl">16<br>64px</div></div>
  <div class="item"><div class="bar" style="height:80px;"></div><div class="lbl">20<br>80px</div></div>
  <div class="item"><div class="bar" style="height:96px;"></div><div class="lbl">24<br>96px</div></div>
</div>
</body>
</html>
